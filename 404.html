<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Alvara Protocol</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'PP Supply Sans';
    src: url('/fonts/PPSupplySans-Regular.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: 'PP Supply Sans';
    src: url('/fonts/PPSupplySans-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
  }

  :root {
    --alvara-pink: #E84393;
    --pink-light: #F06CB5;
    --bg-void: #080810;
    --bg-deep: #0D0B1A;
    --text-primary: #FFFFFF;
    --text-muted: #C4BBD8;
    --font-display: 'PP Supply Sans', 'Impact', sans-serif;
    --font-body: 'Titillium Web', 'Calibri', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
  }

  .glow {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232, 67, 147, 0.1) 0%, transparent 70%);
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    padding: 2rem;
  }

  .error-code {
    font-family: var(--font-display);
    font-size: clamp(5rem, 15vw, 10rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1;
    background: linear-gradient(135deg, var(--alvara-pink), var(--pink-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .message {
    font-size: 1.25rem;
    color: var(--text-muted);
    margin: 1rem 0 2rem;
    max-width: 400px;
  }

  .btn {
    display: inline-block;
    padding: 0.75rem 2rem;
    background: var(--alvara-pink);
    color: white;
    font-family: var(--font-body);
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    border-radius: 6px;
    transition: background 0.2s, transform 0.2s;
  }

  .btn:hover {
    background: var(--pink-light);
    transform: scale(1.02);
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="error-code">404</div>
    <p class="message">This page doesn't exist. It might have been moved or you followed a broken link.</p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
